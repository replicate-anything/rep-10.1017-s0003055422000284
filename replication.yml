paper:
  doi: https://doi.org/10.1017/S0003055422000284
  article_url: https://doi.org/10.1017/S0003055422000284
  title: "Preventing Rebel Resurgence after Civil War: A Field Experiment in Security and Justice Provision in Rural Colombia"
  journal: American Political Science Review
  year: 2022
  authors: Robert A. Blair, Manuel Moscoso, Andrés Vargas Castillo, Michael Weintraub
  dependencies:
    - dataverse
    - haven
    - yaml

maintainer:
  name: Macartan Humphreys
  email: macartan.humphreys@wzb.eu

collections:
  - APSR

repo: replicate-anything/rep-10.1017-s0003055422000284

dataverse:
  server: dataverse.harvard.edu
  dataset: "10.7910/DVN/OXSQMU"
  file: data-1.tab

languages:
  - r
  - stata

stata_packages:
  - estout
  - grstyle

steps:
  - id: access_data
    type: transform
    label: Access data from Dataverse
    description: Download analysis dataset from Harvard Dataverse and save as Stata .dta
    parents: []
    engine: r
    code: code/steps/access_data.R
    dependencies:
      - dataverse
      - haven
      - yaml
    outputs:
      - outputs/data.dta

  - id: tab_1
    group: tab_1
    type: table
    label: Table 1
    description: Prevalence of unresolved and violent disputes (ITT)
    parents:
      - access_data
    engine: stata
    inputs:
      - outputs/data.dta
    data: outputs/data.dta
    code: code/tables/tab_1.do
    stata_source: code/tables/mk_tab_1.do
    format: code/helpers/format_stata.R
    outputs:
      - outputs/tab_1/tab_1_stata.log
      - outputs/tab_1.html
    artifact: outputs/tab_1.html

  - id: tab_1_format
    type: format
    label: Table 1 format
    parent: tab_1
    code: code/helpers/format_stata.R
